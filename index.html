<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Financeiro Pro</title>
    <style>
        :root { 
            --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; 
            --warning: #f39c12; --info: #3498db; --light: #f8f9fa; --dark: #1a252f;
        }
        
        * { box-sizing: border-box; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; margin: 0; color: var(--primary); }
        
        /* Telas de Login Adaptável */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 10000; color: white; padding: 20px;
        }
        #login-screen h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; }
        #login-screen input { 
            padding: 15px; border-radius: 8px; border: none; margin-bottom: 12px; 
            width: 100%; max-width: 320px; text-align: center; font-size: 16px; color: #333;
        }
        #btn-entrar { width: 100%; max-width: 320px; height: 55px; cursor: pointer; border: none; font-weight: bold; border-radius: 8px; }
        
        /* Navbar */
        .navbar { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; min-height: 60px; }
        .navbar strong { font-size: 12px; }

        /* Botão Sair Vermelho */
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; font-size: 12px; border-radius: 6px; font-weight: bold; }
        .btn-logout:hover { background: #c0392b; }

        #main-content { display: none; padding: 10px; }
        
        .container { max-width: 1050px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-controls { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 15px; background: var(--light); 
            border-radius: 10px; border: 1px solid #dee2e6; flex-wrap: wrap; gap: 10px; 
        }

        /* Formulário Responsivo */
        .form-group { 
            display: grid; grid-template-columns: 1fr; gap: 12px; 
            margin-bottom: 25px; background: #fff; padding: 15px; 
            border-radius: 10px; border: 1px solid #dee2e6; 
        }

        @media (min-width: 768px) {
            .form-group { grid-template-columns: 2fr 1.2fr 1fr 0.7fr auto; }
            .container { padding: 30px; }
            #main-content { padding: 20px; }
            .navbar strong { font-size: 16px; }
        }

        .form-group input { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 16px; width: 100%; }
        
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 6px; transition: all 0.2s; padding: 12px 15px; }
        .btn-add { background: var(--primary); color: white; width: 100%; font-size: 16px; }
        @media (min-width: 768px) { .btn-add { width: auto; } }

        /* Tabela */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--primary); color: white; text-align: left; padding: 12px; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .status-badge { padding: 5px 10px; border-radius: 50px; font-size: 10px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .pago { background: #d4edda; color: var(--success); border: 1px solid var(--success); }
        .pendente { background: #f8d7da; color: var(--danger); border: 1px solid var(--danger); }
        
        .actions { display: flex; gap: 8px; }
        .btn-action { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; position: relative; }
        
        /* Legendas (Tooltips) para Web */
        @media (min-width: 1024px) {
            .btn-action:hover::after {
                content: attr(data-label);
                position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
                background: #333; color: #fff; padding: 4px 8px; border-radius: 4px;
                font-size: 10px; white-space: nowrap; z-index: 10;
            }
        }

        /* Resumo */
        .resumo { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        @media (min-width: 600px) { .resumo { grid-template-columns: 1fr 1fr 1fr; } }
        
        .card-resumo { padding: 20px; border-radius: 12px; text-align: center; color: white; font-weight: bold; }
        .card-total { background: var(--info); }
        .card-pago { background: var(--success); }
        .card-pendente { background: var(--danger); }

        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:20000; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">⌛ Processando...</div>

<div id="login-screen">
    <h1>🔒 Controle de Gastos - Login</h1>
    <input type="email" id="email-input" placeholder="E-mail">
    <input type="password" id="password-input" placeholder="Senha">
    <button id="btn-entrar" style="background: var(--success); color: white;">ENTRAR</button>
</div>

<nav class="navbar" id="nav-bar" style="display:none;">
    <div><strong>CONTROLE FINANCEIRO</strong></div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <small id="user-display" style="color: #bdc3c7; display: none;"></small>
        <button id="btn-sair" class="btn-logout">SAIR</button>
    </div>
</nav>

<div id="main-content">
    <div class="container">
        <div class="header-controls">
            <div>Mês: <input type="month" id="filtro-mes" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;"></div>
            <div><strong style="color: var(--primary)">Meus Lançamentos</strong></div>
        </div>

        <div class="form-group">
            <input type="hidden" id="edit-id">
            <input type="text" id="desc" placeholder="Descrição">
            <input type="date" id="data">
            <input type="number" step="0.01" id="valor" placeholder="Valor R$">
            <input type="number" id="parcelas" min="1" value="1" placeholder="Parc.">
            <button class="btn-add" id="btn-lancar">LANÇAR</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody id="lista-gastos"></tbody>
            </table>
        </div>

        <div class="resumo">
            <div class="card-resumo card-total"><small>TOTAL DO MÊS</small><br>R$ <span id="total-mes">0,00</span></div>
            <div class="card-resumo card-pago"><small>TOTAL PAGO</small><br>R$ <span id="total-pago">0,00</span></div>
            <div class="card-resumo card-pendente"><small>PENDENTE</small><br>R$ <span id="total-pendente">0,00</span></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDR6TdX2CBGXxZL8H8TsSO88LWy0MIHI-Y",
        authDomain: "controlefinanceiro-808cd.firebaseapp.com",
        projectId: "controlefinanceiro-808cd",
        storageBucket: "controlefinanceiro-808cd.firebasestorage.app",
        messagingSenderId: "411640830443",
        appId: "1:411640830443:web:551d8a9607f762670be1ae"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let gastos = [];
    let usuarioLogado = null;

    document.getElementById('btn-entrar').addEventListener('click', async () => {
        const email = document.getElementById('email-input').value;
        const pass = document.getElementById('password-input').value;
        try {
            document.getElementById('loading').style.display = 'flex';
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("Acesso negado."); }
        finally { document.getElementById('loading').style.display = 'none'; }
    });

    document.getElementById('btn-sair').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            usuarioLogado = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-display').innerText = user.email;
            if(window.innerWidth > 768) document.getElementById('user-display').style.display = 'inline';
            document.getElementById('filtro-mes').value = new Date().toISOString().substring(0, 7);
            iniciarMonitoramento();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('nav-bar').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    function iniciarMonitoramento() {
        const q = query(collection(db, "gastos"), where("userId", "==", usuarioLogado.uid));
        onSnapshot(q, (snapshot) => {
            gastos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar();
        });
    }

    document.getElementById('btn-lancar').addEventListener('click', async () => {
        const idEdit = document.getElementById('edit-id').value;
        const desc = document.getElementById('desc').value;
        const data = document.getElementById('data').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const parcelas = parseInt(document.getElementById('parcelas').value);

        if(!desc || !data || isNaN(valor)) return;

        try {
            document.getElementById('loading').style.display = 'flex';
            if(idEdit) {
                await updateDoc(doc(db, "gastos", idEdit), { desc, data, valor });
                document.getElementById('edit-id').value = '';
                document.getElementById('btn-lancar').innerText = 'LANÇAR';
            } else {
                for(let i=0; i < parcelas; i++) {
                    let d = new Date(data + 'T00:00:00'); d.setMonth(d.getMonth() + i);
                    await addDoc(collection(db, "gastos"), {
                        userId: usuarioLogado.uid,
                        desc: parcelas > 1 ? `${desc} (${i+1}/${parcelas})` : desc,
                        data: d.toISOString().split('T')[0],
                        valor: valor, pago: false
                    });
                }
            }
            limparCampos();
        } catch (e) { alert("Erro ao salvar."); }
        finally { document.getElementById('loading').style.display = 'none'; }
    });

    window.alternarStatus = async (id, status) => { await updateDoc(doc(db, "gastos", id), { pago: !status }); };
    window.excluirGasto = async (id) => { if(confirm("Deseja excluir?")) await deleteDoc(doc(db, "gastos", id)); };
    
    window.prepararEdicao = (id) => {
        const item = gastos.find(g => g.id === id);
        document.getElementById('edit-id').value = item.id;
        document.getElementById('desc').value = item.desc;
        document.getElementById('data').value = item.data;
        document.getElementById('valor').value = item.valor;
        document.getElementById('btn-lancar').innerText = 'SALVAR';
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    function renderizar() {
        const filtro = document.getElementById('filtro-mes').value;
        const lista = document.getElementById('lista-gastos');
        lista.innerHTML = '';
        let tM=0, tPa=0, tPe=0;

        gastos.filter(g => g.data.substring(0,7) === filtro)
        .sort((a,b) => new Date(a.data) - new Date(b.data))
        .forEach(g => {
            tM += g.valor; g.pago ? tPa += g.valor : tPe += g.valor;
            lista.innerHTML += `<tr>
                <td>${g.data.split('-').reverse().join('/')}</td>
                <td>${g.desc}</td>
                <td>R$ ${g.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td><span class="status-badge ${g.pago?'pago':'pendente'}">${g.pago?'PAGO':'PENDENTE'}</span></td>
                <td class="actions">
                    <button class="btn-action" style="background:var(--success)" onclick="alternarStatus('${g.id}', ${g.pago})" data-label="Pagar/Pendente">✔</button>
                    <button class="btn-action" style="background:var(--warning)" onclick="prepararEdicao('${g.id}')" data-label="Editar">✏</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="excluirGasto('${g.id}')" data-label="Excluir">🗑</button>
                </td></tr>`;
        });
        document.getElementById('total-mes').innerText = tM.toLocaleString('pt-BR',{minimumFractionDigits:2});
        document.getElementById('total-pago').innerText = tPa.toLocaleString('pt-BR',{minimumFractionDigits:2});
        document.getElementById('total-pendente').innerText = tPe.toLocaleString('pt-BR',{minimumFractionDigits:2});
    }

    document.getElementById('filtro-mes').addEventListener('change', renderizar);
    function limparCampos() { 
        document.getElementById('desc').value = ''; 
        document.getElementById('valor').value = ''; 
        document.getElementById('data').value = ''; 
    }
</script>
</body>
</html>
